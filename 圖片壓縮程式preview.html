<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>圖片壓縮工具｜自由人生實驗室</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
      text-align: center;
    }
    .box {
      border: 2px dashed #ccc;
      padding: 40px;
      cursor: pointer;
    }
    img {
      max-width: 100%;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h2>圖片壓縮工具</h2>

<div class="box" id="dropZone">
  拖曳圖片到這裡，或點擊選擇
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none">

<p>
  品質：<input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.7">
</p>

<p>
  最大寬度：<input type="number" id="maxWidth" value="1200">
</p>

<canvas id="canvas"></canvas>

<br>
<button id="downloadBtn" style="display:none">下載壓縮後圖片</button>

<script>
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const downloadBtn = document.getElementById("downloadBtn");

dropZone.onclick = () => fileInput.click();

dropZone.ondragover = (e) => {
  e.preventDefault();
};

dropZone.ondrop = (e) => {
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
};

fileInput.onchange = () => {
  handleFile(fileInput.files[0]);
};

function handleFile(file) {
  const img = new Image();
  img.onload = () => {
    const maxWidth = parseInt(document.getElementById("maxWidth").value);
    let width = img.width;
    let height = img.height;

    if (width > maxWidth) {
      height = height * (maxWidth / width);
      width = maxWidth;
    }

    canvas.width = width;
    canvas.height = height;

    ctx.drawImage(img, 0, 0, width, height);

    compress();
  };
  img.src = URL.createObjectURL(file);
}

function compress() {
  const quality = parseFloat(document.getElementById("quality").value);

  canvas.toBlob((blob) => {
    const url = URL.createObjectURL(blob);

    downloadBtn.style.display = "block";
    downloadBtn.onclick = () => {
      const a = document.createElement("a");
      a.href = url;
      a.download = "compressed.jpg";
      a.click();
    };
  }, "image/jpeg", quality);
}

document.getElementById("quality").oninput = compress;
</script>

</body>
</html>
