<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《馬達加斯加，出發！》詞彙小達人</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2e7d32; /* 森林綠 */
            --secondary-color: #81c784;
            --bg-color: #f1f8e9; /* 淺綠背景 */
            --text-color: #333333;
            --card-bg: #ffffff;
            --correct-color: #2e7d32;
            --wrong-color: #d32f2f;
        }

        * {
            box-sizing: border-box;
            font-family: 'Noto Sans TC', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            font-size: 32px;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .progress-text {
            color: #666;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .question-box {
            background-color: #e8f5e9;
            border-radius: 15px;
            padding: 30px;
            font-size: 26px;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 700;
            color: #1b5e20;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .blank {
            display: inline-block;
            min-width: 100px;
            border-bottom: 4px solid var(--primary-color);
            text-align: center;
            color: var(--primary-color);
            padding: 0 10px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }

        .option-btn {
            background-color: #ffffff;
            border: 3px solid var(--secondary-color);
            border-radius: 12px;
            padding: 20px;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .option-btn:hover:not(:disabled) {
            background-color: var(--secondary-color);
            color: white;
            transform: translateY(-2px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .option-btn.correct {
            background-color: var(--correct-color);
            border-color: var(--correct-color);
            color: white;
            opacity: 1;
        }

        .option-btn.wrong {
            background-color: var(--wrong-color);
            border-color: var(--wrong-color);
            color: white;
            opacity: 1;
        }

        .feedback-box {
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 20px;
            text-align: left;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .feedback-box.correct {
            display: block;
            background-color: #e8f5e9;
            border: 2px solid var(--correct-color);
            color: var(--correct-color);
        }

        .feedback-box.wrong {
            display: block;
            background-color: #ffebee;
            border: 2px solid var(--wrong-color);
            color: var(--wrong-color);
        }

        .feedback-title {
            font-weight: 900;
            font-size: 22px;
            margin-bottom: 5px;
        }

        .next-btn, .restart-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            margin: 0 auto;
            transition: background-color 0.2s;
        }

        .next-btn:hover, .restart-btn:hover {
            background-color: #1b5e20;
        }

        .result-screen {
            display: none;
        }

        .result-screen h2 {
            font-size: 40px;
            color: var(--primary-color);
        }

        .result-screen p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="app-container" id="quiz-screen">
    <h1>《馬達加斯加，出發！》詞彙小達人</h1>
    <div class="progress-text" id="progress">第 1 題 / 共 10 題</div>
    
    <div class="question-box" id="question-text">
        <!-- 題目將由 JS 填入 -->
    </div>

    <div class="options-grid" id="options-container">
        <!-- 選項將由 JS 填入 -->
    </div>

    <div class="feedback-box" id="feedback">
        <div class="feedback-title" id="feedback-title"></div>
        <div id="feedback-desc"></div>
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題</button>
</div>

<div class="app-container result-screen" id="result-screen">
    <h2>測驗完成！</h2>
    <p id="final-score">你的分數：</p>
    <button class="restart-btn" style="display: inline-block;" onclick="restartGame()">再玩一次</button>
</div>

<script>
    // 詞彙資料庫 (擷取自上傳的教材)
    const vocabData = [
        { word: "心馳神往", meaning: "心神專注、嚮往於事物上。", sentence: "這部武俠小說的俠義情節，讓他非常___。" },
        { word: "櫛比鱗次", meaning: "比喻緊密的連接排列。", sentence: "大都會裡高樓大廈___，好像一座水泥叢林。" },
        { word: "錯落有致", meaning: "交錯紛雜但有條理。", sentence: "山間的小屋___，與周圍的景色融為一體。" },
        { word: "不著痕跡", meaning: "不留任何形跡。", sentence: "老師常___的提點我，如何學習與人相處。" },
        { word: "岌岌可危", meaning: "形容非常危險。", sentence: "這棟房子在地震之後出現多處裂縫，隨時都有倒塌的可能，情況___。" },
        { word: "生生不息", meaning: "孳生繁衍而不停止。", sentence: "大自然的生命力___，每年春天都能看到新生的花草樹木。" },
        { word: "何去何從", meaning: "比喻無法作決定。", sentence: "哪一天當人為力量凌駕一切時，目前受到保護的這些物種，牠們該___？" },
        { word: "島嶼", meaning: "四周被水圍繞的小面積陸地。", sentence: "時至今日，地球上仍有許多尚未開發的無人___。" },
        { word: "獨立", meaning: "不倚靠他人而能自立；或指獨自站立。", sentence: "表哥成年後就離家生活，開始學習___。" },
        { word: "輾轉", meaning: "間接的，或指翻來覆去。", sentence: "這個消息是___從別人那裡聽來的，不知是否正確？" }
    ];

    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let hasAnsweredCurrent = false;

    // 取得指定詞彙的完整資料
    function getVocabByWord(wordText) {
        return vocabData.find(v => v.word === wordText);
    }

    // 洗牌陣列函數
    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    // 初始化遊戲
    function initGame() {
        currentQuestions = shuffleArray([...vocabData]); // 複製並打亂題庫
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById("quiz-screen").style.display = "block";
        document.getElementById("result-screen").style.display = "none";
        loadQuestion();
    }

    // 載入題目
    function loadQuestion() {
        hasAnsweredCurrent = false;
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("feedback").className = "feedback-box"; // 隱藏並重置回饋框
        
        const qData = currentQuestions[currentQuestionIndex];
        document.getElementById("progress").innerText = `第 ${currentQuestionIndex + 1} 題 / 共 ${currentQuestions.length} 題`;
        
        // 渲染題目，將 ___ 替換為帶有底線的 span
        const formattedSentence = qData.sentence.replace('___', '<span class="blank" id="blank-slot">？</span>');
        document.getElementById("question-text").innerHTML = formattedSentence;

        // 生成選項 (1個正確 + 3個隨機錯誤)
        let options = [qData.word];
        let availableWrongOptions = vocabData.filter(v => v.word !== qData.word).map(v => v.word);
        availableWrongOptions = shuffleArray(availableWrongOptions);
        
        options.push(availableWrongOptions[0], availableWrongOptions[1], availableWrongOptions[2]);
        options = shuffleArray(options); // 打亂選項順序

        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = ''; // 清空選項
        
        options.forEach(optionText => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = optionText;
            btn.onclick = () => checkAnswer(optionText, qData.word, btn);
            optionsContainer.appendChild(btn);
        });
    }

    // 檢查答案
    function checkAnswer(selectedWord, correctWord, btnElement) {
        const feedbackBox = document.getElementById("feedback");
        const feedbackTitle = document.getElementById("feedback-title");
        const feedbackDesc = document.getElementById("feedback-desc");
        const blankSlot = document.getElementById("blank-slot");
        
        const selectedVocabData = getVocabByWord(selectedWord);

        if (selectedWord === correctWord) {
            // 答對邏輯
            if (!hasAnsweredCurrent) score++; // 第一次就答對才給分
            hasAnsweredCurrent = true;

            // UI 變化
            btnElement.classList.add("correct");
            disableAllButtons();
            
            // 填入空格
            blankSlot.innerText = selectedWord;
            
            // 顯示回饋
            feedbackBox.className = "feedback-box correct";
            feedbackTitle.innerHTML = `✅ 答對了！【${selectedWord}】`;
            feedbackDesc.innerText = selectedVocabData.meaning;
            
            // 顯示下一題按鈕
            document.getElementById("next-btn").style.display = "block";

        } else {
            // 答錯邏輯
            hasAnsweredCurrent = true; // 已經猜過，不再給分
            btnElement.classList.add("wrong");
            btnElement.disabled = true; // 該錯誤按鈕不可再點
            
            // 顯示回饋 (解釋點錯的那個詞的意思)
            feedbackBox.className = "feedback-box wrong";
            feedbackTitle.innerHTML = `❌ 哎呀，再想想！【${selectedWord}】的意思是：`;
            feedbackDesc.innerText = selectedVocabData.meaning;
        }
    }

    // 鎖定所有選項按鈕
    function disableAllButtons() {
        const buttons = document.querySelectorAll(".option-btn");
        buttons.forEach(btn => btn.disabled = true);
    }

    // 下一題
    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentQuestions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    // 顯示結果畫面
    function showResult() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        
        let msg = "";
        if (score === currentQuestions.length) msg = "太厲害了！你是馬達加斯加的詞彙大師！🏆";
        else if (score >= 6) msg = "表現不錯喔！繼續保持！🌟";
        else msg = "多練習幾次，你一定會越來越熟練！💪";

        document.getElementById("final-score").innerHTML = `你答對了 <strong>${score} / ${currentQuestions.length}</strong> 題<br><br>${msg}`;
    }

    // 重新開始
    function restartGame() {
        initGame();
    }

    // 網頁載入後啟動遊戲
    window.onload = initGame;

</script>
</body>
</html>
