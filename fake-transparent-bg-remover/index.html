<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>假透明去背工具</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>假透明去背工具</h1>
        <p>把灰白格子背景轉成真正透明的 PNG，圖片只在你的瀏覽器裡處理。</p>
      </div>
      <div class="status-pill" aria-live="polite">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">尚未選擇圖片</span>
      </div>
    </header>

    <main class="workspace">
      <aside class="tool-panel">
        <label class="drop-zone" id="dropZone" for="fileInput">
          <input id="fileInput" type="file" accept="image/*" hidden />
          <span class="upload-mark" aria-hidden="true">+</span>
          <span>
            <strong>選擇或拖曳圖片</strong>
            <small>PNG、JPG、WebP 都可以</small>
          </span>
        </label>

        <section class="controls" aria-label="去背設定">
          <div class="control-group">
            <div class="control-head">
              <label for="toleranceInput">去除強度</label>
              <output id="toleranceValue" for="toleranceInput">42</output>
            </div>
            <input id="toleranceInput" type="range" min="8" max="120" value="42" />
          </div>

          <div class="control-group">
            <div class="control-head">
              <label for="softnessInput">邊緣柔化</label>
              <output id="softnessValue" for="softnessInput">26</output>
            </div>
            <input id="softnessInput" type="range" min="0" max="90" value="26" />
          </div>

          <div class="control-group compact">
            <label for="cellSizeInput">格子大小</label>
            <div class="number-row">
              <input id="cellSizeInput" type="number" min="3" max="256" value="16" />
              <button id="autoDetectBtn" type="button">自動偵測</button>
            </div>
          </div>

          <div class="switches">
            <label>
              <input id="gridAwareInput" type="checkbox" checked />
              <span>比對格子位置</span>
            </label>
            <label>
              <input id="edgeCleanInput" type="checkbox" checked />
              <span>修掉邊緣灰格</span>
            </label>
          </div>

          <div class="sample-box">
            <div class="sample-title">背景顏色</div>
            <div class="color-grid">
              <button id="pickDarkBtn" class="color-button" type="button">
                <span id="darkSwatch" class="swatch"></span>
                <span>取深格</span>
              </button>
              <button id="pickLightBtn" class="color-button" type="button">
                <span id="lightSwatch" class="swatch light"></span>
                <span>取淺格</span>
              </button>
            </div>
          </div>

          <div class="actions">
            <button id="processBtn" type="button">重新處理</button>
            <button id="downloadBtn" class="primary" type="button" disabled>下載透明 PNG</button>
          </div>

          <p class="hint" id="detectInfo">選圖後會自動估算格子顏色與大小。</p>
        </section>
      </aside>

      <section class="preview-grid" aria-label="圖片預覽">
        <article class="preview-pane">
          <div class="pane-head">
            <h2>原圖</h2>
            <span id="sourceMeta">-</span>
          </div>
          <div class="canvas-frame source-frame">
            <canvas id="sourceCanvas" width="1" height="1"></canvas>
            <div class="empty-state" id="sourceEmpty">把圖片放進來</div>
          </div>
        </article>

        <article class="preview-pane">
          <div class="pane-head">
            <h2>結果</h2>
            <span id="resultMeta">-</span>
          </div>
          <div class="canvas-frame transparent-frame">
            <canvas id="resultCanvas" width="1" height="1"></canvas>
            <div class="empty-state" id="resultEmpty">處理後會出現在這裡</div>
          </div>
        </article>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
