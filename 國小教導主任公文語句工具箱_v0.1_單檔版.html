  <style>
:root{

  --panel:#fffdf9;
  --ink:#1f2937;
  --muted:#6b7280;

  --accent:#374151;
  --accent2:#8b5e34;
  --danger:#a33a3a;
  --soft:#efe7da;
  --shadow:0 10px 25px rgba(31,41,55,.08);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Segoe UI,sans-serif;color:var(--ink);background:var(--bg)}
body{display:flex;justify-content:center}
.app-shell{width:min(100%,420px);min-height:100vh;background:linear-gradient(180deg,#fffdf9 0%,#f8f2e8 100%);border-left:1px solid var(--line);border-right:1px solid var(--line);padding:14px 14px 22px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
h1{font-size:22px;margin:0;letter-spacing:.04em}
p{margin:0}.topbar p,.muted{color:var(--muted);font-size:13px;margin-top:3px}
.search-panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:12px;box-shadow:var(--shadow)}
label{display:block;font-size:13px;color:var(--muted);font-weight:700;margin-bottom:6px}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);font-size:15px;padding:10px 11px;outline:none}
textarea{resize:vertical;line-height:1.55}
input:focus,textarea:focus,select:focus{border-color:#9ca3af;box-shadow:0 0 0 3px rgba(55,65,81,.12)}
.search-row{display:flex;gap:8px;align-items:center}.search-row input{flex:1}.search-row button{width:42px;padding:8px 0}
.smart-hint{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.45}
.tabs{display:flex;gap:8px;overflow-x:auto;padding:12px 0 8px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{white-space:nowrap;border:1px solid var(--line);background:#fffdf9;border-radius:999px;padding:8px 11px;color:var(--ink);font-weight:700;cursor:pointer}.tab.active{background:var(--accent);color:white;border-color:var(--accent)}
.toolbar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:7px 0 8px}@media(min-width:390px){.toolbar{grid-template-columns:1fr 1fr 1fr 1fr}}
button{border:0;border-radius:12px;background:var(--accent);color:white;padding:10px 12px;font-weight:800;cursor:pointer;font-size:14px}button:hover{filter:brightness(.96)}button.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}button.danger{color:var(--danger);border-color:#e9b7b7}button.small{padding:7px 10px;font-size:12px}
.stats{font-size:12px;color:var(--muted);margin:6px 2px 10px;line-height:1.5}
.phrase-list{display:flex;flex-direction:column;gap:10px}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:13px;box-shadow:var(--shadow)}.card-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.card-title{font-weight:900;font-size:16px}.card-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:6px 0 2px;color:var(--muted);font-size:12px;line-height:1.4}.pill{font-size:12px;border-radius:999px;padding:4px 8px;background:var(--soft);color:#513b2a}.pill.warn{background:#ffe7e7;color:#842020;white-space:nowrap}.phrase-text{white-space:pre-wrap;line-height:1.6;font-size:15px;background:#fff8ef;border:1px dashed #e3d4c0;border-radius:13px;padding:10px;margin:8px 0}.note,.warning{font-size:12px;line-height:1.5;margin-top:6px;color:var(--muted)}.warning{color:#8a2d2d;background:#fff1f1;border-radius:10px;padding:7px}.card-actions{display:grid;grid-template-columns:1fr 1fr 42px 42px;gap:7px;margin-top:10px}.icon-btn{padding:9px 0}.star.on{background:#f6e7b4;color:#4b3610;border-color:#e7cd83}.copy-index{font-size:12px;color:var(--muted);margin-left:5px}.empty{padding:24px;text-align:center;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:18px}
.footer-note{font-size:12px;color:var(--muted);margin-top:14px;line-height:1.5}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);background:#111827;color:white;padding:10px 14px;border-radius:999px;opacity:0;pointer-events:none;transition:.18s;max-width:min(92vw,420px);font-size:14px;box-shadow:var(--shadow)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.dialog{border:0;border-radius:20px;padding:0;width:min(94vw,520px);box-shadow:0 25px 80px rgba(0,0,0,.25);background:#fffdf9}.dialog::backdrop{background:rgba(31,41,55,.45)}.dialog form{padding:18px}.dialog h2{margin:0 0 13px}.dialog label{margin-top:10px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.dialog-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
@media(max-width:340px){.grid2{grid-template-columns:1fr}.card-actions{grid-template-columns:1fr 1fr}.app-shell{padding:10px}h1{font-size:19px}}
@media(min-width:900px){body{justify-content:flex-start}.app-shell{margin-left:0;width:380px}}

  </style>

<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>公文語句工具箱</h1>
        <p>國小教導主任版 v0.1</p>
      </div>
      <button id="installBtn" class="ghost small" hidden>安裝</button>
    </header>

    <section class="search-panel">
      <label for="searchInput">搜尋關鍵字或情境</label>
      <div class="search-row">
        <input id="searchInput" type="search" placeholder="例：研習 公假、班親會補休、函報成果、鑒核" autocomplete="off" />
        <button id="clearSearch" class="ghost" title="清除搜尋">×</button>
      </div>
      <div id="smartHint" class="smart-hint">提示：可搜「錢」「老師去研習」「送資料給教育局」這種白話。</div>
    </section>

    <nav class="tabs" id="tabs"></nav>

    <section class="toolbar">
      <button id="addBtn">＋新增</button>
      <button id="exportBtn" class="ghost">匯出 JSON</button>
      <button id="importBtn" class="ghost">匯入</button>
      <button id="resetBtn" class="danger ghost">重設</button>
      <input id="importFile" type="file" accept="application/json,.json" hidden />
    </section>

    <section class="stats" id="stats"></section>

    <main id="phraseList" class="phrase-list" aria-live="polite"></main>

    <footer class="footer-note">
      <p>Alt+1～Alt+9 可複製目前列表前九句。資料儲存在本機瀏覽器 localStorage。</p>
    </footer>
  </div>

  <dialog id="editDialog" class="dialog">
    <form method="dialog" id="editForm">
      <h2 id="dialogTitle">新增語句</h2>
      <input type="hidden" id="editId" />
      <label>標題<input id="editTitle" required /></label>
      <label>語句<textarea id="editText" required rows="4"></textarea></label>
      <div class="grid2">
        <label>分類<select id="editCategory"></select></label>
        <label>子分類<input id="editSubcategory" placeholder="例：公假、經費、函報" /></label>
      </div>
      <div class="grid2">
        <label>用途<input id="editUsageType" placeholder="例：主旨、說明、擬辦、結尾" /></label>
        <label>身分位置<input id="editPosition" placeholder="例：承辦主管、主任核閱" /></label>
      </div>
      <label>標籤（以逗號分隔）<input id="editTags" placeholder="研習, 公假, 教師" /></label>
      <label>搜尋別名（以逗號分隔）<input id="editAliases" placeholder="老師去研習, 請假" /></label>
      <label>備註<textarea id="editNote" rows="2"></textarea></label>
      <label>提醒／警語<textarea id="editWarning" rows="2"></textarea></label>
      <div class="dialog-actions">
        <button value="cancel" type="button" class="ghost" id="cancelEdit">取消</button>
        <button value="default" type="submit">儲存</button>
      </div>
    </form>
  </dialog>

  <dialog id="variableDialog" class="dialog">
    <form method="dialog" id="variableForm">
      <h2>填入變數</h2>
      <p id="variablePhraseTitle" class="muted"></p>
      <div id="variableFields"></div>
      <label>預覽<textarea id="variablePreview" rows="5" readonly></textarea></label>
      <div class="dialog-actions">
        <button value="cancel" type="button" class="ghost" id="cancelVariable">取消</button>
        <button value="default" type="submit">複製</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
const STORAGE_KEY = 'directorPhraseTool.v0.1.phrases';
const FILTER_KEY = 'directorPhraseTool.v0.1.filter';
const TABS = ['常用','擬辦','簽','函','核閱','經費','研習','活動','補休','短語','全部'];
const EDIT_CATEGORIES = ['擬辦','簽','函','核閱','短語'];
let phrases = [];
let activeTab = localStorage.getItem(FILTER_KEY) || '常用';
let searchTerm = '';
let currentVariablePhrase = null;
let deferredPrompt = null;

const $ = (id)=>document.getElementById(id);
const normalize = (s)=>String(s||'').toLowerCase().replace(/\s+/g,'').trim();
const nowIso = ()=>new Date().toISOString();
function uid(){ return 'custom-' + Math.random().toString(36).slice(2,10) + '-' + Date.now().toString(36); }

function loadData(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){
    try{ phrases = JSON.parse(raw); return; }catch(e){ console.warn(e); }
  }
  phrases = structuredClone(window.DEFAULT_PHRASES || []);
  saveData();
}
function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(phrases)); }
function toast(msg){
  const el=$('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer=setTimeout(()=>el.classList.remove('show'),1800);
}

function scorePhrase(p,q){
  if(!q) return 0;
  const nq=normalize(q);
  const fields=[p.title,p.text,p.category,p.subcategory,p.scenario,p.usageType,p.note,p.warning,(p.tags||[]).join(''),(p.aliases||[]).join('')];
  let score=0;
  fields.forEach((f,idx)=>{ const nf=normalize(f); if(nf.includes(nq)) score += idx<2 ? 8 : 4; });
  // multi token bonus
  q.split(/[\s,，、]+/).filter(Boolean).forEach(t=>{
    const nt=normalize(t); if(!nt) return;
    fields.forEach((f,idx)=>{ if(normalize(f).includes(nt)) score += idx<2 ? 3 : 2; });
  });
  return score;
}
function inTab(p,tab){
  if(tab==='全部') return true;
  if(tab==='常用') return p.favorite || (p.usageCount||0)>0;
  if(['擬辦','簽','函','核閱','短語'].includes(tab)) return p.category===tab;
  const hay = normalize([p.category,p.subcategory,p.usageType,p.title,p.text,(p.tags||[]).join(' '),(p.aliases||[]).join(' ')].join(' '));
  return hay.includes(normalize(tab));
}
function filteredPhrases(){
  const q=searchTerm;
  let list=phrases.map(p=>({...p,_score:scorePhrase(p,q)})).filter(p=>inTab(p,activeTab));
  if(q.trim()) list=list.filter(p=>p._score>0);
  list.sort((a,b)=>{
    if((b.favorite?1:0)!==(a.favorite?1:0)) return (b.favorite?1:0)-(a.favorite?1:0);
    if(searchTerm && b._score!==a._score) return b._score-a._score;
    const ad=a.lastUsedAt?Date.parse(a.lastUsedAt):0, bd=b.lastUsedAt?Date.parse(b.lastUsedAt):0;
    if(bd!==ad) return bd-ad;
    if((b.usageCount||0)!==(a.usageCount||0)) return (b.usageCount||0)-(a.usageCount||0);
    return String(a.title).localeCompare(String(b.title),'zh-Hant');
  });
  return list;
}
function renderTabs(){
  $('tabs').innerHTML=TABS.map(t=>`<button class="tab ${t===activeTab?'active':''}" data-tab="${t}">${t}</button>`).join('');
  document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{activeTab=btn.dataset.tab;localStorage.setItem(FILTER_KEY,activeTab);render();}));
}
function escapeHtml(str){return String(str??'').replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function renderList(){
  const list=filteredPhrases();
  const total=phrases.length;
  $('stats').textContent=`顯示 ${list.length} / ${total} 句｜目前分類：${activeTab}${searchTerm?'｜搜尋：'+searchTerm:''}`;
  if(list.length===0){ $('phraseList').innerHTML='<div class="empty">找不到語句。可以換個關鍵字，或按「＋新增」建立自己的句子。</div>'; return; }
  $('phraseList').innerHTML=list.map((p,i)=>cardHtml(p,i)).join('');
  document.querySelectorAll('[data-copy]').forEach(btn=>btn.addEventListener('click',()=>copyPhrase(btn.dataset.copy)));
  document.querySelectorAll('[data-star]').forEach(btn=>btn.addEventListener('click',()=>toggleFavorite(btn.dataset.star)));
  document.querySelectorAll('[data-edit]').forEach(btn=>btn.addEventListener('click',()=>openEdit(btn.dataset.edit)));
  document.querySelectorAll('[data-var]').forEach(btn=>btn.addEventListener('click',()=>openVariable(btn.dataset.var)));
}
function cardHtml(p,i){
  const metaParts=[p.category,p.subcategory].filter(Boolean);
  const metaHtml=metaParts.length || p.warning
    ? `<div class="card-meta">${metaParts.length?`<span>${escapeHtml(metaParts.join(' / '))}</span>`:''}${p.warning?'<span class="pill warn">有提醒</span>':''}</div>`
    : '';
  const hasVars=(p.variables&&p.variables.length)||/【[^】]+】/.test(p.text);
  return `<article class="card">
    <div class="card-head">
      <div><div class="card-title">${escapeHtml(p.title)} <span class="copy-index">#${i+1}</span></div></div>
      <button class="ghost icon-btn star ${p.favorite?'on':''}" data-star="${p.id}" title="收藏">${p.favorite?'★':'☆'}</button>
    </div>
    ${metaHtml}
    <div class="phrase-text">${escapeHtml(p.text)}</div>
    ${p.note?`<div class="note">備註：${escapeHtml(p.note)}</div>`:''}
    ${p.warning?`<div class="warning">提醒：${escapeHtml(p.warning)}</div>`:''}
    <div class="card-actions">
      <button data-copy="${p.id}">複製</button>
      ${hasVars?`<button class="ghost" data-var="${p.id}">填變數</button>`:`<button class="ghost" disabled>無變數</button>`}
      <button class="ghost icon-btn" data-edit="${p.id}" title="編輯">✎</button>
      <button class="ghost icon-btn" data-delete="${p.id}" title="刪除" onclick="deletePhrase('${p.id}')">🗑</button>
    </div>
  </article>`;
}
function render(){ renderTabs(); renderList(); }
async function writeClipboard(text){
  try{ await navigator.clipboard.writeText(text); return true; }
  catch(e){
    const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.left='-9999px'; document.body.appendChild(ta); ta.focus(); ta.select();
    const ok=document.execCommand('copy'); ta.remove(); return ok;
  }
}
async function copyText(text, id){
  const ok=await writeClipboard(text);
  if(ok){
    if(id){ const p=phrases.find(x=>x.id===id); if(p){ p.usageCount=(p.usageCount||0)+1; p.lastUsedAt=nowIso(); saveData(); renderList(); } }
    toast('已複製：' + text.slice(0,30) + (text.length>30?'…':''));
  }else toast('複製失敗，請手動選取文字。');
}
function copyPhrase(id){ const p=phrases.find(x=>x.id===id); if(p) copyText(p.text,p.id); }
function toggleFavorite(id){ const p=phrases.find(x=>x.id===id); if(!p) return; p.favorite=!p.favorite; p.updatedAt=nowIso(); saveData(); renderList(); }
window.deletePhrase=function(id){
  const p=phrases.find(x=>x.id===id); if(!p) return;
  if(confirm(`確定刪除「${p.title}」？`)){ phrases=phrases.filter(x=>x.id!==id); saveData(); render(); toast('已刪除'); }
}
function openEdit(id){
  const p=id?phrases.find(x=>x.id===id):null;
  $('dialogTitle').textContent=p?'編輯語句':'新增語句';
  $('editId').value=p?.id||'';
  $('editTitle').value=p?.title||'';
  $('editText').value=p?.text||'';
  $('editCategory').value=p?.category||'擬辦';
  $('editSubcategory').value=p?.subcategory||'';
  $('editUsageType').value=p?.usageType||'';
  $('editPosition').value=p?.position||'承辦主管';
  $('editTags').value=(p?.tags||[]).join(', ');
  $('editAliases').value=(p?.aliases||[]).join(', ');
  $('editNote').value=p?.note||'';
  $('editWarning').value=p?.warning||'';
  $('editDialog').showModal();
}
function saveEdit(e){
  e.preventDefault();
  const id=$('editId').value || uid();
  const old=phrases.find(x=>x.id===id);
  const text=$('editText').value.trim();
  const item={
    ...(old||{}), id,
    title:$('editTitle').value.trim(), text,
    category:$('editCategory').value, subcategory:$('editSubcategory').value.trim(),
    scenario: old?.scenario || '', role:'國小教導主任', position:$('editPosition').value.trim()||'承辦主管',
    documentType:$('editCategory').value, usageType:$('editUsageType').value.trim(),
    tags:$('editTags').value.split(/[,，、]/).map(s=>s.trim()).filter(Boolean),
    aliases:$('editAliases').value.split(/[,，、]/).map(s=>s.trim()).filter(Boolean),
    variables:[...new Set(Array.from(text.matchAll(/【([^】]+)】/g)).map(m=>m[1]))],
    note:$('editNote').value.trim(), warning:$('editWarning').value.trim(),
    favorite:old?.favorite||false, usageCount:old?.usageCount||0, lastUsedAt:old?.lastUsedAt||null,
    createdAt:old?.createdAt||nowIso(), updatedAt:nowIso()
  };
  if(old) phrases=phrases.map(x=>x.id===id?item:x); else phrases.unshift(item);
  saveData(); $('editDialog').close(); render(); toast('已儲存');
}
function openVariable(id){
  const p=phrases.find(x=>x.id===id); if(!p) return;
  currentVariablePhrase=p;
  const vars=p.variables?.length?p.variables:[...new Set(Array.from(p.text.matchAll(/【([^】]+)】/g)).map(m=>m[1]))];
  $('variablePhraseTitle').textContent=p.title;
  $('variableFields').innerHTML=vars.map(v=>`<label>${escapeHtml(v)}<input data-var-name="${escapeHtml(v)}" placeholder="請填入${escapeHtml(v)}" /></label>`).join('');
  const update=()=>{
    let out=p.text;
    document.querySelectorAll('[data-var-name]').forEach(inp=>{ const name=inp.dataset.varName; out=out.replaceAll(`【${name}】`, inp.value || `【${name}】`); });
    $('variablePreview').value=out;
  };
  document.querySelectorAll('[data-var-name]').forEach(inp=>inp.addEventListener('input',update));
  update(); $('variableDialog').showModal();
}
function submitVariable(e){ e.preventDefault(); if(currentVariablePhrase){ copyText($('variablePreview').value,currentVariablePhrase.id); } $('variableDialog').close(); }
function exportJson(){
  const blob=new Blob([JSON.stringify(phrases,null,2)],{type:'application/json;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='國小教導主任公文語句庫.json'; a.click(); URL.revokeObjectURL(a.href);
}
function importJson(file){
  const reader=new FileReader();
  reader.onload=()=>{
    try{ const data=JSON.parse(reader.result); if(!Array.isArray(data)) throw new Error('不是陣列'); phrases=data; saveData(); render(); toast('匯入完成'); }
    catch(e){ alert('匯入失敗：JSON 格式不正確。'); }
  };
  reader.readAsText(file,'utf-8');
}
function resetDefaults(){
  if(confirm('確定重設為內建語句？目前自訂與使用紀錄會被覆蓋。')){ phrases=structuredClone(window.DEFAULT_PHRASES||[]); saveData(); render(); toast('已重設'); }
}
function setup(){
  $('searchInput').addEventListener('input',e=>{searchTerm=e.target.value; renderList();});
  $('clearSearch').addEventListener('click',()=>{$('searchInput').value='';searchTerm='';renderList();$('searchInput').focus();});
  $('addBtn').addEventListener('click',()=>openEdit());
  $('cancelEdit').addEventListener('click',()=>$('editDialog').close());
  $('editForm').addEventListener('submit',saveEdit);
  $('exportBtn').addEventListener('click',exportJson);
  $('importBtn').addEventListener('click',()=>$('importFile').click());
  $('importFile').addEventListener('change',e=>{ if(e.target.files[0]) importJson(e.target.files[0]); e.target.value=''; });
  $('resetBtn').addEventListener('click',resetDefaults);
  $('cancelVariable').addEventListener('click',()=>$('variableDialog').close());
  $('variableForm').addEventListener('submit',submitVariable);
  EDIT_CATEGORIES.forEach(c=>{ const opt=document.createElement('option'); opt.value=c; opt.textContent=c; $('editCategory').appendChild(opt); });
  document.addEventListener('keydown',e=>{
    if(e.altKey && /^[1-9]$/.test(e.key)){
      e.preventDefault(); const list=filteredPhrases(); const p=list[Number(e.key)-1]; if(p) copyPhrase(p.id);
    }
  });
  window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; $('installBtn').hidden=false; });
  $('installBtn').addEventListener('click',async()=>{ if(deferredPrompt){ deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; $('installBtn').hidden=true; } });
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }
}
loadData(); setup(); render(); $('searchInput').focus();

  </script>
</body>
</html>
